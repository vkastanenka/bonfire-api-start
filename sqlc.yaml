version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/repository/00_init.sql"
      - "internal/repository/01_outbox.sql"
      - "internal/repository/02_users.sql"
      - "internal/repository/03_user_delete_requests.sql"
      - "internal/repository/04_user_profiles.sql"
      - "internal/repository/05_user_sessions.sql"
    queries: "internal/repository/queries_*.sql"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
